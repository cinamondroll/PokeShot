<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Glow Border Canvas</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100dvh;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;

            background: linear-gradient(-45deg,
                    #0f172a,
                    #1e293b,
                    #312e81,
                    #111827);

            background-size: 400% 400%;

            animation: bgMove 10s ease infinite;
        }

        /* ====================== */
        /* WRAPPER */
        /* ====================== */

        .canvas-wrapper {
            position: relative;

            width: min(95vw, 960px);

            aspect-ratio: 16 / 9;

            padding: 4px;

            border-radius: 16px;

            overflow: hidden;
        }

        /* ====================== */
        /* GLOW */
        /* ====================== */

        .canvas-wrapper::before {
            content: "";

            position: absolute;

            inset: -200%;

            background: conic-gradient(from 0deg,
                    cyan,
                    blue,
                    purple,
                    pink,
                    red,
                    orange,
                    yellow,
                    lime,
                    cyan);

            animation: rotateGlow 4s linear infinite;
        }

        /* ====================== */
        /* INNER BACKGROUND */
        /* ====================== */

        .canvas-wrapper::after {
            content: "";

            position: absolute;

            inset: 4px;

            background: black;

            border-radius: 12px;

            z-index: 0;
        }

        /* ====================== */
        /* CANVAS */
        /* ====================== */

        canvas {
            position: relative;

            z-index: 1;

            width: 100%;
            height: 100%;

            display: block;

            border-radius: 12px;
        }

        /* ====================== */
        /* BACKGROUND ANIMATION */
        /* ====================== */

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* ====================== */
        /* ROTATE GLOW */
        /* ====================== */

        @keyframes rotateGlow {
            100% {
                transform: rotate(360deg);
            }
        }

        /* ====================== */
        /* MOBILE */
        /* ====================== */

        @media (max-width: 768px) {
            .canvas-wrapper {
                width: 98vw;
            }
        }
    </style>
</head>

<body>

    <div class="canvas-wrapper">

        <canvas id="myCanvas" width="960" height="540">
        </canvas>

    </div>

    <script src="kuis08.js"></script>

</body>

</html>
