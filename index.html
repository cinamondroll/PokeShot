<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rune Hunter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #050112;
        }

        /* ====================== */
        /* SCENE                  */
        /* ====================== */

        .scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 50% 90%, rgba(70,15,140,0.55) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 0%,  rgba(40,10,100,0.35) 0%, transparent 50%),
                linear-gradient(180deg, #090120 0%, #060018 55%, #030012 100%);
            overflow: hidden;
        }

        /* ====================== */
        /* FOREST SILHOUETTES     */
        /* ====================== */

        .forest {
            position: absolute;
            bottom: 0;
            height: 78vh;
        }

        .forest-left  { left: 0; width: clamp(90px, 18vw, 260px); }
        .forest-right { right: 0; width: clamp(90px, 18vw, 260px); transform: scaleX(-1); }

        /* ====================== */
        /* CRYSTALS               */
        /* ====================== */

        .crystal-group {
            position: absolute;
            bottom: 0;
            width: 90px;
            height: 150px;
        }

        .crystal-group.left  { left:  clamp(8px, 3.5vw, 70px); }
        .crystal-group.right { right: clamp(8px, 3.5vw, 70px); transform: scaleX(-1); }

        .crystal {
            position: absolute;
            bottom: 0;
            background: linear-gradient(150deg,
                rgba(215,135,255,0.95) 0%,
                rgba(125,50,235,0.82)  40%,
                rgba(50,10,135,0.60)   100%);
            animation: crystalGlow 3s ease-in-out infinite alternate;
            will-change: filter;
        }

        .crystal.c1 {
            left: 24px; width: 17px; height: 78px;
            clip-path: polygon(30% 0%, 70% 0%, 100% 28%, 82% 100%, 18% 100%, 0% 28%);
            animation-delay: 0s;
        }
        .crystal.c2 {
            left: 4px;  width: 23px; height: 112px;
            clip-path: polygon(36% 0%, 64% 0%, 100% 30%, 76% 100%, 24% 100%, 0% 30%);
            animation-delay: 0.7s;
        }
        .crystal.c3 {
            left: 44px; width: 14px; height: 56px;
            clip-path: polygon(28% 0%, 72% 0%, 100% 32%, 80% 100%, 20% 100%, 0% 32%);
            animation-delay: 1.4s;
        }
        .crystal.c4 {
            left: 56px; width: 19px; height: 90px;
            clip-path: polygon(33% 0%, 67% 0%, 100% 28%, 78% 100%, 22% 100%, 0% 28%);
            animation-delay: 0.35s;
        }

        @keyframes crystalGlow {
            from {
                filter: drop-shadow(0 0  7px rgba(165, 80,255,0.75))
                        drop-shadow(0 0 18px rgba(115, 40,215,0.40));
            }
            to {
                filter: drop-shadow(0 0 15px rgba(215,135,255,1.00))
                        drop-shadow(0 0 32px rgba(165, 80,255,0.72))
                        drop-shadow(0 0 55px rgba(115, 40,215,0.30));
            }
        }

        /* ====================== */
        /* PARTICLES              */
        /* ====================== */

        #particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(215, 165, 255, 0.92);
            box-shadow: 0 0 6px rgba(205,145,255,0.80),
                        0 0 14px rgba(155, 80,255,0.50);
            pointer-events: none;
            animation: particleFloat linear forwards;
        }

        @keyframes particleFloat {
            0%   { opacity: 0;   transform: translate(0,0) scale(1); }
            8%   { opacity: 1; }
            80%  { opacity: 0.5; }
            100% { opacity: 0;   transform: translate(var(--dx,0px), -170px) scale(0.2); }
        }

        /* ====================== */
        /* FRAME WRAPPER          */
        /* ====================== */

        .frame-wrapper {
            position: relative;
            z-index: 1;
            width: min(95vw, 960px);
            aspect-ratio: 16 / 9;
            animation: borderGlow 3s ease-in-out infinite alternate;
        }

        canvas {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Chamfered corners matching SVG border (25px cut at each corner) */
            clip-path: polygon(
                2.6% 0%,    97.4% 0%,
                100% 4.63%, 100% 95.37%,
                97.4% 100%, 2.6% 100%,
                0% 95.37%,  0% 4.63%
            );
        }

        .frame-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
            z-index: 2;
        }

        /* ====================== */
        /* SPARK PARTICLES        */
        /* ====================== */

        @keyframes spark {
            0%   { transform: translate(0,0) scale(1);                              opacity: 1; }
            100% { transform: translate(var(--sx,0px),var(--sy,-22px)) scale(0.08); opacity: 0; }
        }

        .spark {
            animation: spark ease-out infinite;
            transform-box: fill-box;
            transform-origin: 50% 50%;
        }

        /* ====================== */
        /* ANIMATIONS             */
        /* ====================== */

        /* ====================== */
        /* RESPONSIVE ORIENTATION */
        /* ====================== */

        /* Portrait: constrain by width */
        @media (orientation: portrait) {
            .frame-wrapper { width: 98vw; }
        }

        /* Landscape on small screens: constrain by height */
        @media (orientation: landscape) and (max-height: 600px) {
            .frame-wrapper {
                width: auto;
                height: 95vh;
            }
        }

        @keyframes borderGlow {
            from {
                box-shadow:
                    0 0  40px rgba(120, 50,220,0.50),
                    0 0  85px rgba( 90, 30,185,0.30),
                    0 0 145px rgba( 55, 15,145,0.15);
            }
            to {
                box-shadow:
                    0 0  68px rgba(188, 88,255,0.88),
                    0 0 135px rgba(152, 68,248,0.52),
                    0 0 220px rgba(112, 46,208,0.28);
            }
        }

        /* ====================== */
        /* MOBILE                 */
        /* ====================== */

        @media (max-width: 768px) {
            .frame-wrapper { width: 98vw; }
        }
    </style>
</head>

<body>

    <!-- ====================== -->
    <!-- BACKGROUND SCENE       -->
    <!-- ====================== -->
    <div class="scene">

        <!-- Left forest -->

            <polygon points="0,600 45,320 100,600"   fill="#0a0820"/>
            <polygon points="120,600 210,240 260,600" fill="#0c0922"/>
            <polygon points="5,600  45,410  90,600"  fill="#0f0c28"/>
            <polygon points="55,600 105,360 160,600" fill="#0e0b26"/>
            <polygon points="155,600 215,390 260,600" fill="#100d2a"/>
            <rect x="0" y="575" width="260" height="25" fill="#0a071e"/>
        </svg>

        <!-- Crystals left -->
        <div class="crystal-group left">
            <div class="crystal c2"></div>
            <div class="crystal c1"></div>
            <div class="crystal c3"></div>
        </div>

        <!-- Crystals right -->

            <div class="crystal c2"></div>

        <div id="particles"></div>
    </div>

    <!-- ====================== -->
    <!-- GAME FRAME             -->
    <!-- ====================== -->
    <div class="frame-wrapper">

        <canvas id="myCanvas" width="960" height="540"></canvas>

        <!-- Decorative SVG frame overlay -->
        <svg class="frame-svg" viewBox="0 0 960 540"
             xmlns="http://www.w3.org/2000/svg"
             xmlns:xlink="http://www.w3.org/1999/xlink">
            <defs>

                    <feGaussianBlur stdDeviation="2.5" result="b"/>
                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="fg2" x="-300%" y="-300%" width="700%" height="700%">
                    <feGaussianBlur stdDeviation="5.5" result="b"/>
                    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <!-- Path for orbit comet animation -->
                <path id="orbit-path"
                      d="M25,3 L935,3 L957,25 L957,515 L935,537 L25,537 L3,515 L3,25 Z"/>
            </defs>

            <!-- Outermost faint line -->
            <path d="M21,1 L939,1 L959,21 L959,519 L939,539 L21,539 L1,519 L1,21 Z"

            <!-- Main border -->
            <path d="M25,3 L935,3 L957,25 L957,515 L935,537 L25,537 L3,515 L3,25 Z"
                  fill="none" stroke="rgba(158,78,255,0.90)" stroke-width="1.5"
                  filter="url(#fg)"/>

            <!-- Inner border -->
            <path d="M31,9 L929,9 L951,31 L951,509 L929,531 L31,531 L9,509 L9,31 Z"
                  fill="none" stroke="rgba(88,32,185,0.44)" stroke-width="1"/>

            <!-- Innermost subtle line -->
            <path d="M37,15 L923,15 L945,37 L945,503 L923,525 L37,525 L15,503 L15,37 Z"
                  fill="none" stroke="rgba(62,16,142,0.20)" stroke-width="1"/>

            <!-- ===== CORNER ACCENTS ===== -->

            <!-- Top-Left -->
            <g filter="url(#fg)">
                <line x1="3"  y1="25" x2="3"  y2="88"  stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="25" y1="3"  x2="88" y2="3"   stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="9"  y1="31" x2="9"  y2="74"  stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <line x1="31" y1="9"  x2="74" y2="9"   stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <circle cx="3"  cy="25" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="25" cy="3"  r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="3"  cy="88" r="1.5" fill="rgba(175,105,255,0.65)"/>
                <circle cx="88" cy="3"  r="1.5" fill="rgba(175,105,255,0.65)"/>
            </g>

            <!-- Top-Right -->
            <g filter="url(#fg)">
                <line x1="957" y1="25" x2="957" y2="88"  stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="935" y1="3"  x2="872" y2="3"   stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="951" y1="31" x2="951" y2="74"  stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <line x1="929" y1="9"  x2="886" y2="9"   stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <circle cx="957" cy="25" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="935" cy="3"  r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="957" cy="88" r="1.5" fill="rgba(175,105,255,0.65)"/>
                <circle cx="872" cy="3"  r="1.5" fill="rgba(175,105,255,0.65)"/>
            </g>

            <!-- Bottom-Left -->
            <g filter="url(#fg)">
                <line x1="3"  y1="515" x2="3"  y2="452" stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="25" y1="537" x2="88" y2="537" stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="9"  y1="509" x2="9"  y2="466" stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <line x1="31" y1="531" x2="74" y2="531" stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <circle cx="3"  cy="515" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="25" cy="537" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="3"  cy="452" r="1.5" fill="rgba(175,105,255,0.65)"/>
                <circle cx="88" cy="537" r="1.5" fill="rgba(175,105,255,0.65)"/>
            </g>

            <!-- Bottom-Right -->
            <g filter="url(#fg)">
                <line x1="957" y1="515" x2="957" y2="452" stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="935" y1="537" x2="872" y2="537" stroke="rgba(188,108,255,1)"   stroke-width="2.5"/>
                <line x1="951" y1="509" x2="951" y2="466" stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <line x1="929" y1="531" x2="886" y2="531" stroke="rgba(122,52,212,0.52)" stroke-width="1.5"/>
                <circle cx="957" cy="515" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="935" cy="537" r="2.5" fill="rgba(218,158,255,1)"/>
                <circle cx="957" cy="452" r="1.5" fill="rgba(175,105,255,0.65)"/>
                <circle cx="872" cy="537" r="1.5" fill="rgba(175,105,255,0.65)"/>
            </g>

            <!-- ===== TOP CENTER ICON ===== -->
            <!-- Group centered on top border: translate so cy=19 lands at SVG y=3 -->
            <g transform="translate(461,-16)" filter="url(#fg2)">
                <circle cx="19" cy="19" r="16"
                        stroke="rgba(168,88,255,0.93)" stroke-width="1.5"
                        fill="rgba(7,2,20,0.90)"/>
                <circle cx="19" cy="19" r="10"
                        stroke="rgba(108,38,212,0.58)" stroke-width="1"
                        fill="none"/>
                <line x1="3"  y1="19" x2="35" y2="19"
                      stroke="rgba(168,88,255,0.92)" stroke-width="1.5"/>
                <circle cx="19" cy="19" r="3.5" fill="rgba(218,168,255,1)"/>
                <line x1="-373" y1="19" x2="0"   y2="19"
                      stroke="rgba(140,60,230,0.32)" stroke-width="1" stroke-dasharray="10,18"/>
                <line x1="38"   y1="19" x2="411" y2="19"
                      stroke="rgba(140,60,230,0.32)" stroke-width="1" stroke-dasharray="10,18"/>
                <!-- Sparks -->
                <circle class="spark" cx="19" cy="19" r="2.5" fill="rgba(242,195,255,1)"
                        style="--sx:-22px;--sy:-18px;animation-duration:1.6s;animation-delay:0.0s"/>
                <circle class="spark" cx="19" cy="19" r="2.0" fill="rgba(218,168,255,1)"
                        style="--sx:20px;--sy:-22px;animation-duration:2.0s;animation-delay:0.55s"/>
                <circle class="spark" cx="19" cy="19" r="3.0" fill="rgba(255,220,255,1)"
                        style="--sx:-8px;--sy:-26px;animation-duration:1.45s;animation-delay:1.1s"/>
                <circle class="spark" cx="19" cy="19" r="1.8" fill="rgba(228,178,255,1)"
                        style="--sx:26px;--sy:-10px;animation-duration:1.85s;animation-delay:1.65s"/>
            </g>

            <!-- ===== BOTTOM CENTER ICON ===== -->
            <!-- cy=19 lands at SVG y=537 (bottom border) -->
            <g transform="translate(461,518)" filter="url(#fg2)">
                <circle cx="19" cy="19" r="16"
                        stroke="rgba(168,88,255,0.93)" stroke-width="1.5"
                        fill="rgba(7,2,20,0.90)"/>
                <circle cx="19" cy="19" r="10"
                        stroke="rgba(108,38,212,0.58)" stroke-width="1"
                        fill="none"/>
                <line x1="3"  y1="19" x2="35" y2="19"
                      stroke="rgba(168,88,255,0.92)" stroke-width="1.5"/>
                <circle cx="19" cy="19" r="3.5" fill="rgba(218,168,255,1)"/>
                <line x1="-373" y1="19" x2="0"   y2="19"
                      stroke="rgba(140,60,230,0.32)" stroke-width="1" stroke-dasharray="10,18"/>
                <line x1="38"   y1="19" x2="411" y2="19"
                      stroke="rgba(140,60,230,0.32)" stroke-width="1" stroke-dasharray="10,18"/>
                <!-- Sparks (fly downward) -->
                <circle class="spark" cx="19" cy="19" r="2.5" fill="rgba(242,195,255,1)"
                        style="--sx:-20px;--sy:20px;animation-duration:1.7s;animation-delay:0.2s"/>
                <circle class="spark" cx="19" cy="19" r="2.0" fill="rgba(218,168,255,1)"
                        style="--sx:22px;--sy:18px;animation-duration:2.1s;animation-delay:0.75s"/>
                <circle class="spark" cx="19" cy="19" r="3.0" fill="rgba(255,220,255,1)"
                        style="--sx:-6px;--sy:28px;animation-duration:1.5s;animation-delay:1.3s"/>
                <circle class="spark" cx="19" cy="19" r="1.8" fill="rgba(228,178,255,1)"
                        style="--sx:24px;--sy:12px;animation-duration:1.9s;animation-delay:1.8s"/>
            </g>

            <!-- ===== TOP-RIGHT DIAMOND ===== -->
            <!-- Center lands near SVG (940, 0) -->
            <g transform="translate(920,-20)" filter="url(#fg2)">
                <polygon points="20,3 37,20 20,37 3,20"
                         stroke="rgba(168,88,255,0.93)" stroke-width="1.5"
                         fill="rgba(7,2,20,0.88)"/>
                <polygon points="20,10 30,20 20,30 10,20"
                         stroke="rgba(108,38,212,0.50)" stroke-width="1"
                         fill="none"/>
                <circle cx="20" cy="20" r="3" fill="rgba(218,168,255,1)"/>
                <!-- Sparks -->
                <circle class="spark" cx="20" cy="20" r="2.2" fill="rgba(242,195,255,1)"
                        style="--sx:18px;--sy:-18px;animation-duration:1.55s;animation-delay:0.1s"/>
                <circle class="spark" cx="20" cy="20" r="2.8" fill="rgba(255,220,255,1)"
                        style="--sx:-14px;--sy:-20px;animation-duration:1.9s;animation-delay:0.7s"/>

            <!-- ===== BOTTOM-LEFT DIAMOND ===== -->
            <!-- Center lands near SVG (20, 521) -->
            <g transform="translate(0,501)" filter="url(#fg2)">
                <polygon points="20,3 37,20 20,37 3,20"
                         stroke="rgba(168,88,255,0.93)" stroke-width="1.5"
                         fill="rgba(7,2,20,0.88)"/>
                <polygon points="20,10 30,20 20,30 10,20"
                         stroke="rgba(108,38,212,0.50)" stroke-width="1"

                <circle cx="20" cy="20" r="3" fill="rgba(218,168,255,1)"/>
                <!-- Sparks -->
                <circle class="spark" cx="20" cy="20" r="2.2" fill="rgba(242,195,255,1)"
                        style="--sx:-18px;--sy:18px;animation-duration:1.65s;animation-delay:0.3s"/>
                <circle class="spark" cx="20" cy="20" r="2.8" fill="rgba(255,220,255,1)"

                <circle class="spark" cx="20" cy="20" r="1.6" fill="rgba(218,168,255,1)"
                        style="--sx:-22px;--sy:8px;animation-duration:1.45s;animation-delay:1.5s"/>
            </g>

            <!-- ===== EDGE TICK MARKS ===== -->
            <g stroke="rgba(128,58,222,0.52)" stroke-width="1" filter="url(#fg)">
                <line x1="240" y1="3"   x2="240" y2="13"/>
                <line x1="720" y1="3"   x2="720" y2="13"/>
                <line x1="240" y1="537" x2="240" y2="527"/>
                <line x1="720" y1="537" x2="720" y2="527"/>
                <line x1="3"   y1="185" x2="13"  y2="185"/>
                <line x1="3"   y1="355" x2="13"  y2="355"/>
                <line x1="957" y1="185" x2="947" y2="185"/>
                <line x1="957" y1="355" x2="947" y2="355"/>
            </g>

            <!-- ===== ORBIT COMET (travels along border path) ===== -->
            <!-- Trail segment 1 — furthest back, faintest -->
            <ellipse cx="-38" cy="0" rx="20" ry="1.8" fill="rgba(155,72,240,0.18)" filter="url(#fg)">
                <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                    <mpath xlink:href="#orbit-path"/>
                </animateMotion>
            </ellipse>
            <!-- Trail segment 2 -->
            <ellipse cx="-22" cy="0" rx="16" ry="2.4" fill="rgba(178,90,255,0.38)" filter="url(#fg)">
                <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                    <mpath xlink:href="#orbit-path"/>
                </animateMotion>
            </ellipse>
            <!-- Trail segment 3 — just behind head -->
            <ellipse cx="-10" cy="0" rx="11" ry="3" fill="rgba(205,120,255,0.62)" filter="url(#fg)">
                <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                    <mpath xlink:href="#orbit-path"/>
                </animateMotion>
            </ellipse>
            <!-- Outer halo around head -->
            <circle cx="0" cy="0" r="11" fill="rgba(190,110,255,0.28)" filter="url(#fg)">
                <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
                    <mpath xlink:href="#orbit-path"/>
                </animateMotion>
            </circle>
            <!-- Bright head -->
            <circle cx="0" cy="0" r="5.5" fill="rgba(248,225,255,1)" filter="url(#fg2)">

    <!-- ====================== -->
    <!-- PARTICLE SYSTEM        -->
    <!-- ====================== -->
    <script>
        (function () {
            var container = document.getElementById('particles');

            var sources = [
                { x: 2.5, y: 84 }, { x: 4.5, y: 79 }, { x: 6.5, y: 76 },
                { x: 3.5, y: 87 }, { x: 5.5, y: 73 }, { x: 1.5, y: 81 },
                { x: 93,  y: 84 }, { x: 95,  y: 79 }, { x: 97,  y: 76 },
                { x: 91,  y: 87 }, { x: 96,  y: 73 }
            ];

            function spawn() {
                var src = sources[Math.floor(Math.random() * sources.length)];
                var p   = document.createElement('div');
                p.className = 'particle';
                var size = 1.5 + Math.random() * 3;
                var dur  = 5   + Math.random() * 9;
                var dx   = (Math.random() - 0.5) * 44;
                p.style.cssText =
                    'left:'   + src.x + 'vw;' +
                    'top:'    + src.y + 'vh;' +
                    'width:'  + size  + 'px;' +
                    'height:' + size  + 'px;' +
                    '--dx:'   + dx    + 'px;' +
                    'animation-duration:' + dur + 's;';
                container.appendChild(p);
                setTimeout(function () { p.remove(); }, dur * 1000 + 200);
            }

            for (var i = 0; i < 24; i++) setTimeout(spawn, i * 125);
            setInterval(spawn, 370);
        })();
    </script>
